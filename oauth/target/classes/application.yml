server:
  port: 8080

spring:
  application:
    name: auth-app

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          github:
            
            scope:
              - user:email
              - read:user
